<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Шахта Знаний</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <header class="header">
    <div class="header-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 22 12 2l10 20"/><path d="M6 14h12"/>
      </svg>
      Шахта Знаний
    </div>
    <div class="header-resources">
      <div class="res-chip gold">⚡ <span id="res-gold">0</span></div>
      <div class="res-chip gem">💎 <span id="res-gems">0</span></div>
    </div>
  </header>

  <main class="main">
    <section id="screen-mine"     class="screen active"></section>
    <section id="screen-theory"   class="screen"></section>
    <section id="screen-vseross"  class="screen"></section>
    <section id="screen-secret"   class="screen"></section>
    <section id="screen-progress" class="screen"></section>
  </main>

  <nav class="bottom-nav" data-cols="5">
    <button class="nav-btn active" id="nav-mine" onclick="App.switchScreen('mine')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 22 12 2l10 20"/><path d="M6 14h12"/>
      </svg>
      Шахта
    </button>
    <button class="nav-btn" id="nav-theory" onclick="App.switchScreen('theory')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Теория
    </button>
    <button class="nav-btn" id="nav-vseross" onclick="App.switchScreen('vseross')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="6"/>
        <path d="M8 14v7m4-7v7m4-7v7"/>
      </svg>
      Всерос
    </button>
    <button class="nav-btn" id="nav-secret" onclick="App.switchScreen('secret')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Секрет
    </button>
    <button class="nav-btn" id="nav-progress" onclick="App.switchScreen('progress')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
      </svg>
      Прогресс
    </button>
  </nav>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <div id="modal-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/state.js"></script>
<script src="js/mine.js"></script>
<script src="js/theory.js"></script>
<script src="js/vseross.js"></script>
<script src="js/secret.js"></script>
<script src="js/progress.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
